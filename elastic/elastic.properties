elastic.min_tp_threads=2
elastic.min_compaction_threads=2
elastic.max_compaction_num=32
elastic.compaction_morsel_size=2000
elastic.tp_morsel_size=2000
elastic.level_segment_max_sorted_run_num=10
elastic.level_segment_max_file_num=4,2,2,2,2,2,2

elastic.dbname=/nvme1/caoyihao/ycsb-elastic
elastic.destroy=true
elastic.sync=false

# Load options from file
elastic.optionsfile=elastic/options.ini

# Below options are ignored if options file is used
elastic.compression=snappy
elastic.max_background_jobs=2
elastic.target_file_size_base=67108864
elastic.target_file_size_multiplier=1
elastic.max_bytes_for_level_base=268435456
elastic.write_buffer_size=67108864
elastic.max_open_files=-1
elastic.max_write_buffer_number=2
elastic.use_direct_io_for_flush_compaction=false
elastic.use_direct_reads=false
elastic.allow_mmap_writes=false
elastic.allow_mmap_reads=false
elastic.cache_size=8388608
elastic.bloom_bits=10

# deprecated since rocksdb 8.0
elastic.compressed_cache_size=0

elastic.increase_parallelism=false
elastic.optimize_level_style_compaction=false